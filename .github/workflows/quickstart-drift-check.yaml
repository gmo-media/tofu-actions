# Run drift checks manually or on cron
name: Drift Check

on:
  workflow_call:
    inputs:
      # automatic drift fix via Claude Code on Vertex AI.
      workload-identity-provider:
        description: Workload Identity Provider for Google Cloud authentication (Vertex AI)
        type: string
        required: false
      service-account:
        description: Service account email for Google Cloud authentication (Vertex AI)
        type: string
        required: false
      anthropic-vertex-project-id:
        description: Anthropic Vertex AI project ID for automatic drift fix
        type: string
        required: false
      cloud-ml-region:
        description: Cloud ML region for Vertex AI
        type: string
        required: false
      anthropic-model:
        description: Anthropic model to use for automatic drift fix
        type: string
        required: false
    secrets:
      drift-notify-webhook:
        description: Slack webhook URL for drift notification (if omitted, the step fails on detecting drift)
        required: false

      github-token:
        description: GitHub token for creating PR in automatic drift fix (optional, required for triggering workflows)
        required: false

permissions:
  contents: write
  actions: read
  pull-requests: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - id: prepare
        uses: gmo-media/tofu-actions/prepare@v5
        with:
          force-all-changed: "true"
    outputs:
      strategy: ${{ steps.prepare.outputs.strategy }}

  drift-check:
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.strategy) }}
    runs-on: ubuntu-latest
    steps:
      - uses: gmo-media/tofu-actions/configure@v5
        with:
          dir: ${{ matrix.dir }}

      - id: plan
        uses: gmo-media/tofu-actions/plan@v5
        with:
          dir: ${{ matrix.dir }}

      # NOTE: "if" condition cannot reference "secrets" directly, so use shell steps as a workaround
      - id: check-webhook
        shell: bash
        run: |
          if [ -n "${{ secrets.drift-notify-webhook }}" ]; then
            echo "do-notify=true" >> $GITHUB_OUTPUT
          else
            echo "do-notify=false" >> $GITHUB_OUTPUT
          fi

      # decision (it self-skips when auto-fix is not configured).
      - if: ${{ steps.plan.outputs.has-diff == 'true' }}
        id: fix
        uses: gmo-media/tofu-actions/drift-fix-claude@v5
        with:
          dir: ${{ matrix.dir }}
          plan: ${{ steps.plan.outputs.plan }}
          github-token: ${{ secrets.github-token }}
          workload-identity-provider: ${{ inputs.workload-identity-provider }}
          service-account: ${{ inputs.service-account }}
          anthropic-vertex-project-id: ${{ inputs.anthropic-vertex-project-id }}
          cloud-ml-region: ${{ inputs.cloud-ml-region }}
          anthropic-model: ${{ inputs.anthropic-model }}

      # Notify on the fix outcome (success or internal skip). The action's
      # summary output carries the right message (skip reason, or PR URL).
      - if: ${{ !cancelled() && steps.plan.outputs.has-diff == 'true' && steps.check-webhook.outputs.do-notify == 'true' && steps.fix.outcome == 'success' }}
        uses: gmo-media/tofu-actions/notify-drift@v5
        with:
          dir: ${{ matrix.dir }}
          plan: ${{ steps.plan.outputs.plan }}
          additional-message: ${{ steps.fix.outputs.summary || 'Please review the changes and fix manually.' }}
          webhook: ${{ secrets.drift-notify-webhook }}

      # The automatic fix hard-failed (e.g. Claude errored). Notify with the
      # original drift plan so a human can take over.
      - if: ${{ !cancelled() && steps.plan.outputs.has-diff == 'true' && steps.check-webhook.outputs.do-notify == 'true' && steps.fix.outcome == 'failure' }}
        uses: gmo-media/tofu-actions/notify-drift@v5
        with:
          dir: ${{ matrix.dir }}
          plan: ${{ steps.plan.outputs.plan }}
          additional-message: "The automatic drift fix failed; manual action is needed. See the workflow logs for details."
          webhook: ${{ secrets.drift-notify-webhook }}

      # Simply fail to notify the user if no webhook is given
      - if: ${{ steps.plan.outputs.has-diff == 'true' && steps.check-webhook.outputs.do-notify == 'false' }}
        shell: bash
        run: |
          echo "Drift detected in ${{ matrix.dir }}."
          exit 1

      # If this workflow itself is failing for some reason (e.g. plan failure), AND if webhook is configured, notify the user
      - if: ${{ failure() && !cancelled() && steps.check-webhook.outputs.do-notify == 'true' && steps.fix.outcome != 'failure' }}
        name: Send Slack notification
        uses: slackapi/slack-github-action@fc46ded2fc4d7f11bfa62864526f920cf1a1167d # v3
        with:
          webhook: ${{ secrets.drift-notify-webhook }}
          webhook-type: incoming-webhook
          payload: |
            text: "⚠️ Drift detection failed in ${{ matrix.dir }} environment"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: "⚠️ Drift Detection Failed"
                  emoji: true
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*Repository:*\n<${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>"
                  - type: "mrkdwn"
                    text: "*Workflow Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "Drift detection has failed. Please review the workflow logs to see if manual action is needed."
              - type: "actions"
                elements:
                  - type: "button"
                    text:
                      type: "plain_text"
                      text: "View Workflow Log"
                      emoji: true
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
