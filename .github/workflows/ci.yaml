name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  js-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - working-directory: ./prepare-js
        run: |
          npm ci
          npm run package
      - working-directory: ./read-config
        run: |
          npm ci
          npm run package

      - run: git diff --exit-code

  js-commit:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - working-directory: ./prepare-js
        run: |
          npm ci
          npm run package
      - working-directory: ./read-config
        run: |
          npm ci
          npm run package

      - name: Commit and push if there is diff
        run: |
          if ! git diff --exit-code; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "[skip ci] Rebuild js dist"
            git push origin ${{ github.event.pull_request.head.ref }}
          fi

  shell-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Run drift-fix idempotency match tests
        run: bash drift-fix-claude/tests/match-existing-pr.test.sh
      - name: Run drift-fix no-change gate tests
        run: bash drift-fix-claude/tests/no-change-gate.test.sh
      - name: Run drift-fix skill packaging tests
        run: bash drift-fix-claude/tests/fix-drift-skill.test.sh
      - name: Run drift-fix human-commit detection tests
        run: bash drift-fix-claude/tests/has-human-commits.test.sh
      - name: Run drift-fix verify plan runner tests
        run: bash drift-fix-claude/tests/run-verify-plan.test.sh
      - name: Run drift-fix scripts lint
        run: bash drift-fix-claude/tests/scripts-lint.test.sh
      - name: Run drift-fix action inputs consistency tests
        run: bash drift-fix-claude/tests/action-inputs.test.sh
      - name: Run drift-fix guard config gate tests
        run: bash drift-fix-claude/tests/guard-config-gate.test.sh
