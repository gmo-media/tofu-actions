name: Fix Drift with Claude
description: Uses Claude Code to fix infrastructure drift and opens a pull request with the changes.

inputs:
  config:
    description: tofu-actions config file
    default: .github/tofu-actions-config.js
  dir:
    description: Directory that has drift to fix
    required: true
  plan:
    description: The plan output from drift check showing the drift
    required: true

  github-token:
    description: GitHub token (GitHub App or PAT is required to trigger workflows)
  anthropic-api-key:
    description: Anthropic API key
  claude-code-oauth-token:
    description: Claude Code OAuth token (alternative to anthropic_api_key)

  base-branch:
    description: Base branch for the PR
    default: ${{ github.ref_name }}

outputs:
  pr-url:
    description: URL of the created pull request (empty when skipped)
    value: ${{ steps.create-pr.outputs.pr-url }}
  branch-name:
    description: Name of the branch with fixes (empty when skipped)
    value: ${{ steps.branch.outputs.name }}
  skipped:
    description: "true if an open drift-fix PR already existed and the fix was skipped"
    value: ${{ steps.guard.outputs.skip }}
  existing-pr-number:
    description: Number of the existing open drift-fix PR when skipped (otherwise empty)
    value: ${{ steps.guard.outputs.existing-pr-number }}
  fix-verified:
    description: "'true' if the fix was verified (plan shows no changes), 'false' if a draft PR was created unverified, empty when no PR was created"
    value: ${{ steps.verify.outputs.fix-verified }}

runs:
  using: composite
  steps:
    # Skip everything below (including the costly Claude run) when an open
    # drift-fix PR for this dir already exists, so repeated cron runs do not
    # pile up duplicate PRs for the same unresolved drift.
    # The match logic lives in scripts/match-existing-pr.jq (shared with the
    # unit test in tests/match-existing-pr.test.sh).
    - name: Skip if an open drift-fix PR already exists
      id: guard
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token || github.token }}
        DIR: ${{ inputs.dir }}
        BASE_BRANCH: ${{ inputs.base-branch }}
      run: |
        # --limit 200: default is 30; raise it so drift-fix PRs are not buried.
        PRS=$(gh pr list \
          --state open \
          --base "$BASE_BRANCH" \
          --limit 200 \
          --json number,headRefName)

        EXISTING_PR=$(printf '%s' "$PRS" \
          | jq -r --arg dir "$DIR" -f "$GITHUB_ACTION_PATH/scripts/match-existing-pr.jq")

        if [ -n "$EXISTING_PR" ]; then
          {
            echo "skip=true"
            echo "existing-pr-number=$EXISTING_PR"
          } >> "$GITHUB_OUTPUT"
          echo "Skipped drift fix for \`$DIR\`: open PR #$EXISTING_PR already exists." >> "$GITHUB_STEP_SUMMARY"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - id: config
      if: ${{ steps.guard.outputs.skip != 'true' }}
      uses: gmo-media/tofu-actions/read-config@v5
      with:
        config: ${{ inputs.config }}
        dir: ${{ inputs.dir }}

    # Create a new branch for the fix
    - name: Create fix branch
      if: ${{ steps.guard.outputs.skip != 'true' }}
      id: branch
      shell: bash
      run: |
        # COUPLING (keep in sync): this branch name is matched by the guard via
        # scripts/match-existing-pr.jq. Changing the format here requires
        # updating that filter (and its tests) accordingly.
        BRANCH_NAME="fix-drift-$(echo '${{ inputs.dir }}' | tr '/' '-')-$(date +%Y%m%d-%H%M%S)"
        git checkout -b "$BRANCH_NAME"
        echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT

    - name: Save plan to file
      if: ${{ steps.guard.outputs.skip != 'true' }}
      shell: bash
      env:
        PLAN: ${{ inputs.plan }}
      run: echo "$PLAN" > /tmp/plan.txt

    - name: Setup Claude Code
      if: ${{ steps.guard.outputs.skip != 'true' }}
      shell: bash
      run: |
        curl -fsSL https://claude.ai/install.sh | bash -s latest
        export PATH="~/.local/bin:$PATH"

    # Use Claude Code to fix the drift
    - name: Fix drift with Claude Code
      if: ${{ steps.guard.outputs.skip != 'true' }}
      shell: bash
      run: |
        echo "$PROMPT" | \
          claude -p --verbose --output-format stream-json \
          --allowedTools "Bash,Edit,Glob,Grep,LS,MultiEdit,Read,Task,TodoWrite,WebFetch,WebSearch,Write" \
          --disallowedTools "Bash(${{ steps.config.outputs.tf-binary }}  apply),Bash(git commit),Bash(git push)"
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-code-oauth-token }}
        PROMPT: |
          # CRITICAL INSTRUCTIONS FOR FIXING INFRASTRUCTURE DRIFT
          You have been given a critical task to fix infrastructure drift in Terraform/OpenTofu configuration files.
          Your goal is to update the .tf files to match the current real-world infrastructure state.

          ## Important Rules
          - NEVER run `${{ steps.config.outputs.tf-binary }} apply` even if there is a need to update tfstate. Preserve the existing infrastructure state.
          - Only make changes to .tf files and run `${{ steps.config.outputs.tf-binary }}  plan`.
          - Always choose the least destructive approach. Be surgical and precise with your edits.
          
          ## Context
          - Directory with drift: ${{ inputs.dir }}
          - The plan result is in /tmp/plan.txt
          
          ## YOUR MISSION - FOLLOW THESE STEPS EXACTLY:
          1. Read the plan and understand the changes
          The plan is trying to *revert* the external changes done to the infrastructure.
          For example, if the plan shows:
          ```
          ~ resource "aws_instance" "example" {
              ~ instance_type = "t3.micro" -> "t2.micro"
          }
          ```
          "t3.micro" is the real infrastructure state, while "t2.micro" is what's in our .tf files.
          This means a user may have manually changed the instance type from t2.micro to t3.micro, and didn't update the .tf file.
          You should update the .tf file to match reality - "t3.micro".
          
          The plan is usually quite verbose with default values.
          Try not to be confused by these verbose lines - try to extract only the important changes.
          
          2. Fix the drift
          Update .tf files to match the CURRENT REAL INFRASTRUCTURE STATE.
          This means: incorporate the external changes into your .tf files.
          
          3. Validate
          After making changes, run: `${{ steps.config.outputs.tf-binary }}  plan` within directory `${{ inputs.dir }}`.
          The plan MUST show "No changes. Your infrastructure matches the configuration."
          If there are still differences, continue fixing until plan shows no changes.

    # No-change gate: deterministically verify Claude's fix by re-running
    # plan and requiring "No changes". The verdict mapping lives in
    # scripts/no-change-gate.sh (shared with tests/no-change-gate.test.sh).
    - name: Verify drift is resolved (no-change gate)
      id: verify
      if: ${{ steps.guard.outputs.skip != 'true' }}
      shell: bash
      env:
        DIR: ${{ inputs.dir }}
        TF_BINARY: ${{ steps.config.outputs.tf-binary }}
      run: |
        # git status --porcelain also catches newly created .tf files,
        # unlike git diff (assumes init artifacts like .terraform/ are
        # gitignored in the consumer repo, same as the git add -A below).
        if [ -n "$(git status --porcelain)" ]; then
          HAS_DIFF=true
        else
          HAS_DIFF=false
        fi

        set +e
        (cd "$DIR" && "$TF_BINARY" plan -lock-timeout=300s ${{ contains(steps.config.outputs.tf-binary, 'tofu') && '-concise ' || ''}}-detailed-exitcode) > /tmp/verify-plan-raw.txt
        PLAN_EXIT_CODE=$?
        set -e

        # Remove ansi colors (the cleaned output is reused in the PR body)
        sed -e 's/\x1b\[[0-9;]*m//g' /tmp/verify-plan-raw.txt > /tmp/verify-plan.txt

        VERDICT=$("$GITHUB_ACTION_PATH/scripts/no-change-gate.sh" "$PLAN_EXIT_CODE" "$HAS_DIFF")
        {
          echo "verdict=$VERDICT"
          if [ "$VERDICT" = "pr" ]; then
            echo "fix-verified=true"
          elif [ "$VERDICT" = "draft-pr" ]; then
            echo "fix-verified=false"
          else
            echo "fix-verified="
          fi
        } >> "$GITHUB_OUTPUT"

        case "$VERDICT" in
          pr)
            echo "Verified: plan shows no changes after the fix in \`$DIR\`." >> "$GITHUB_STEP_SUMMARY"
            ;;
          resolved)
            echo "Drift in \`$DIR\` is already resolved; skipping PR creation." >> "$GITHUB_STEP_SUMMARY"
            ;;
          draft-pr)
            {
              echo "Verification failed: plan still shows changes after the fix in \`$DIR\`; creating a draft PR."
              echo '```plaintext'
              cat /tmp/verify-plan.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            ;;
          *)
            if [ "$PLAN_EXIT_CODE" = "2" ]; then
              echo "Claude made no changes but drift remains in \`$DIR\`." | tee -a "$GITHUB_STEP_SUMMARY"
            else
              echo "Verification plan failed in \`$DIR\` (exit code $PLAN_EXIT_CODE)." | tee -a "$GITHUB_STEP_SUMMARY"
            fi
            cat /tmp/verify-plan.txt
            exit 1
            ;;
        esac

    # Commit the changes (whether successful or not, for debugging)
    - name: Commit changes
      if: ${{ steps.guard.outputs.skip != 'true' }}
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # Check if there are changes to commit
        if git diff --exit-code; then
          echo "No changes to commit"
          exit 0
        fi

        git add -A

        COMMIT_MSG="fix: Auto-fix infrastructure drift in ${{ inputs.dir }}

        This commit automatically fixes infrastructure drift detected in ${{ inputs.dir }}.
        The changes update the Terraform/OpenTofu configuration to match the current
        real-world infrastructure state.

        Automated by Claude Code drift fixer"

        git commit -m "$COMMIT_MSG"
        git push origin ${{ steps.branch.outputs.name }}
        echo "Changes committed and pushed to branch ${{ steps.branch.outputs.name }}"

    # Create a pull request if changes were made
    - name: Create Pull Request
      if: ${{ steps.guard.outputs.skip != 'true' }}
      id: create-pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token || github.token }}
      run: |
        # Check if changes were pushed
        if ! git rev-parse --verify origin/${{ steps.branch.outputs.name }} >/dev/null 2>&1; then
          echo "No changes were pushed, skipping PR creation"
          exit 0
        fi

        # Using GitHub CLI to create PR
        PR_URL=$(gh pr create \
            --title "🔧 Auto-fix infrastructure drift in ${{ inputs.dir }}" \
            --base "${{ inputs.base-branch }}" \
            --head "${{ steps.branch.outputs.name }}" \
            --body "## 🤖 Automated Drift Fix

        This PR is an automatic attempt to fix infrastructure drift in \`${{ inputs.dir }}\`.

        ### What happened?
        Infrastructure drift was detected during the drift check. This means the real-world infrastructure 
        state differs from what's defined in the Terraform/OpenTofu configuration files.

        ### What this PR does
        - Updates the .tf configuration files to match the current real infrastructure state
        - Makes minimal, non-destructive changes
        - Ensures \`${{ steps.config.outputs.tf-binary }}  plan\` shows \"No changes\" after the fix

        ### Review checklist
        - [ ] Review the changes to ensure they correctly reflect the infrastructure state
        - [ ] Verify that only drifted values were updated
        - [ ] Confirm no unnecessary default values were added
        - [ ] Check that the changes are minimal and non-destructive

        ---
        *This PR was automatically generated by the drift fix workflow using Claude Code.*")

        echo "Pull request created: $PR_URL"
        echo "pr-url=$PR_URL" >> $GITHUB_OUTPUT
