name: Fix Drift with Claude
description: Uses Claude Code to fix infrastructure drift and opens a pull request with the changes.

inputs:
  config:
    description: tofu-actions config file
    default: .github/tofu-actions-config.js
  dir:
    description: Directory that has drift to fix
    required: true
  plan:
    description: The plan output from drift check showing the drift
    required: true

  github-token:
    description: >-
      GitHub App token or PAT for PR creation and push. The default
      GITHUB_TOKEN cannot trigger downstream workflows.
  workload-identity-provider:
    description: >-
      Workload Identity Provider for Vertex AI auth. All three Vertex AI
      inputs must be set; when any is omitted the action skips.
  service-account:
    description: >-
      Service account email for Vertex AI auth. All three Vertex AI inputs
      must be set; when any is omitted the action skips.
  anthropic-vertex-project-id:
    description: >-
      Anthropic Vertex AI project ID. All three Vertex AI inputs must be
      set; when any is omitted the action skips.
  cloud-ml-region:
    description: Cloud ML region for Vertex AI
  anthropic-model:
    description: Anthropic model to use

  base-branch:
    description: Base branch for the PR
    default: ${{ github.ref_name }}

outputs:
  pr-url:
    description: URL of the created pull request (empty when skipped)
    value: ${{ steps.create-pr.outputs.pr-url }}
  branch-name:
    description: Name of the branch with fixes (empty when skipped)
    value: ${{ steps.branch.outputs.name }}
  skipped:
    description: "true if the fix was skipped: auto-fix is not configured (missing Vertex AI inputs)"
    value: ${{ steps.guard.outputs.skip }}
  summary:
    description: One-line outcome for notification (skip reason or PR URL). Empty on hard failure.
    value: ${{ steps.guard.outputs.summary || steps.create-pr.outputs.summary }}

runs:
  using: composite
  steps:
    - id: config
      uses: gmo-media/tofu-actions/read-config@v5
      with:
        config: ${{ inputs.config }}
        dir: ${{ inputs.dir }}

    # Skip when auto-fix is not configured (missing Vertex AI inputs).
    # See scripts/guard-existing-pr.sh.
    - name: Check existing drift-fix PR (skip / create / update)
      id: guard
      shell: bash
      env:
        DIR: ${{ inputs.dir }}
        WORKLOAD_IDENTITY_PROVIDER: ${{ inputs.workload-identity-provider }}
        SERVICE_ACCOUNT: ${{ inputs.service-account }}
        ANTHROPIC_VERTEX_PROJECT_ID: ${{ inputs.anthropic-vertex-project-id }}
      run: '"$GITHUB_ACTION_PATH/scripts/guard-existing-pr.sh"'

    # Create a new branch for the fix. See scripts/create-fix-branch.sh.
    - name: Create fix branch
      if: ${{ steps.guard.outputs.skip != 'true' }}
      id: branch
      shell: bash
      env:
        DIR: ${{ inputs.dir }}
        MODE: ${{ steps.guard.outputs.mode }}
        EXISTING_BRANCH: ""
      run: '"$GITHUB_ACTION_PATH/scripts/create-fix-branch.sh"'

    - name: Save plan to file
      if: ${{ steps.guard.outputs.skip != 'true' }}
      shell: bash
      env:
        PLAN: ${{ inputs.plan }}
      run: echo "$PLAN" > /tmp/plan.txt

    # Authenticate to Google Cloud for Vertex AI. The credentials are NOT
    # exported as job-wide env vars: configure@v5 already set up ADC for
    # Terraform/OpenTofu, and overwriting GOOGLE_APPLICATION_CREDENTIALS here
    # would break any plan runs that follow. The credentials file is passed
    # to the Claude step alone via its step env below.
    - name: Authenticate to Google Cloud
      if: ${{ steps.guard.outputs.skip != 'true' }}
      id: vertex-auth
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
      with:
        workload_identity_provider: ${{ inputs.workload-identity-provider }}
        service_account: ${{ inputs.service-account }}
        export_environment_variables: false

    # The auth action writes gha-creds-*.json into the workspace and
    # commit-and-push.sh runs `git add -A`. configure@v5 only adds this
    # ignore in gcp-oidc mode, so repeat it here unconditionally to keep
    # credentials out of the fix PR.
    - name: Ignore generated credentials from google-github-actions/auth
      if: ${{ steps.guard.outputs.skip != 'true' }}
      shell: bash
      run: |
        mkdir -p ~/.config/git
        echo "gha-creds-*.json" >> ~/.config/git/ignore

    # Use Claude Code to fix the drift. The prompt lives in
    # .claude/skills/fix-drift/SKILL.md at the repository root (the parent of
    # the action path); --add-dir makes Claude Code auto-load skills from
    # that directory's .claude/skills.
    # COUPLING (keep in sync): the /fix-drift argument order must match the
    # `arguments:` declaration in that SKILL.md.
    # Pin >= v1.0.144: older releases (e.g. v1.0.37) pin a Claude Code CLI
    # that predates skill auto-loading from --add-dir directories (2.1.32).
    # continue-on-error: a mid-run Claude failure (API error, credential
    # expiry, max-turns) may still leave useful partial edits. Do NOT let it
    # abort the action; the commit step below will push whatever was edited.
    - name: Fix drift with Claude Code
      if: ${{ steps.guard.outputs.skip != 'true' }}
      uses: anthropics/claude-code-action@0cb4f3e5e764d2e00407d29b6bf0aa9df0976d88 # v1.0.146
      continue-on-error: true
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.vertex-auth.outputs.credentials_file_path }}
        ANTHROPIC_VERTEX_PROJECT_ID: ${{ inputs.anthropic-vertex-project-id }}
        CLOUD_ML_REGION: ${{ inputs.cloud-ml-region }}
        ANTHROPIC_MODEL: ${{ inputs.anthropic-model }}
      with:
        use_vertex: "true"
        github_token: ${{ inputs.github-token || github.token }}
        # Safe to expand inputs.dir into the prompt directly: the guard
        # validated it against a strict charset ([A-Za-z0-9._/-]) first, so it
        # carries no shell/prompt metacharacters. tf-binary is from read-config
        # (tofu|terraform), not free-form caller input.
        prompt: /fix-drift ${{ inputs.dir }} ${{ steps.config.outputs.tf-binary }} /tmp/plan.txt
        claude_args: >-
          --add-dir "${{ github.action_path }}/.."
          --allowedTools "Bash,Edit,Glob,Grep,LS,MultiEdit,Read,Task,TodoWrite,WebFetch,WebSearch,Write"
          --disallowedTools "Bash(${{ steps.config.outputs.tf-binary }} apply:*),Bash(git commit:*),Bash(git push:*)"

    # Commit the changes. See scripts/commit-and-push.sh.
    - name: Commit changes
      if: ${{ steps.guard.outputs.skip != 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token || github.token }}
        DIR: ${{ inputs.dir }}
        BRANCH_NAME: ${{ steps.branch.outputs.name }}
      run: '"$GITHUB_ACTION_PATH/scripts/commit-and-push.sh"'

    # Create a pull request if changes were committed.
    # See scripts/create-pr.sh.
    - name: Create or update Pull Request
      if: ${{ steps.guard.outputs.skip != 'true' }}
      id: create-pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token || github.token }}
        DIR: ${{ inputs.dir }}
        TF_BINARY: ${{ steps.config.outputs.tf-binary }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        BRANCH_NAME: ${{ steps.branch.outputs.name }}
        VERDICT: pr
        MODE: ${{ steps.guard.outputs.mode }}
        EXISTING_PR_NUMBER: ""
      run: '"$GITHUB_ACTION_PATH/scripts/create-pr.sh"'
